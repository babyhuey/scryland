repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.13.4
          - pydantic-settings>=2.14.1
          - types-requests
        args: [--ignore-missing-imports, --no-strict-optional, src/scryland]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (no coverage, fast subset)
        entry: uv run pytest -x --no-cov tests/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
